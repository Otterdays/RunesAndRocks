version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: runes_postgres
    environment:
      POSTGRES_USER: runes_admin
      POSTGRES_PASSWORD: runes_password
      POSTGRES_DB: runesandrocks
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    container_name: runes_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
